app:
  description: 测试专用。裸模型基线对比，只做最简单的LLM分类，不加规则引擎。用于和SpecMark Agent做A/B对比。
  icon: "\U0001F9EA"
  icon_background: '#F0E0FF'
  icon_type: emoji
  mode: advanced-chat
  name: SpecMark-裸模型测试
  use_icon_as_answer_icon: false
