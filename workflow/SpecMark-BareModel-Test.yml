    - data:
        code: "import json\n\ndef main(file_content: list, user_query: str) -> dict:\n\
          \    content = ''\n    if file_content:\n        try:\n            if isinstance(file_content,\
          \ list):\n                content = '\\n'.join([str(item).strip() for item\
          \ in file_content if item and str(item).strip()])\n            else:\n \
          \               content = str(file_content).strip()\n        except:\n \
          \           content = str(file_content).strip()\n    \n    if not content.strip():\n\
          \        content = user_query.strip() if user_query else ''\n    \n    return\
          \ {\n        'formatted_content': content,\n        'has_content': bool(content.strip())\n\
          \    }"
        code_language: python3
        outputs:
          formatted_content:
            children: null
            type: string
          has_content:
            children: null
            type: boolean
        selected: false
