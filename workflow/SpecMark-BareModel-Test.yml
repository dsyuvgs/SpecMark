      - .CSV
      - .JSON
      - .TXT
      - .MD
      - .XLSX
      - .XLS
      - .DOCX
      - .DOC
      allowed_file_types:
      - document
      allowed_file_upload_methods:
      - local_file
      enabled: true
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
      number_limits: 5
    opening_statement: "🧪 裸模型测试专用\n\n只做最简单的LLM分类，不加任何规则引擎。\n\n用法：\n1. 上传CSV/JSON/TXT文件 → 自动批量分类\n2. 直接粘贴反馈内容 → 分类单条\n\n输出格式：序号 | 情绪 | 问题类型 | 优先级"
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 帮我分类这些反馈
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
