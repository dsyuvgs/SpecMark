    - data:
        code: |
          import json
          import re

          def main(classifier_output: str, user_query: str, has_files: str) -> dict:
              validated_type = 'invalid_input'
              confidence = 0.0
              llm_type = ''

              has_file = False
              if has_files:
                  has_files_str = str(has_files).strip()
                  if has_files_str and has_files_str.lower() not in ['none', 'null', '[]', '{}', 'false', '']:
                      has_file = True

              prd_intent_kw = ['检查', 'PRD', 'prd', '文档', '需求文档', '产品需求',
                               '这份', '怎么样', '好不好', '有没有问题', '帮我看看',
                               '检查一下', '看看这份', '审一下', '评审', '风险',
                               '审查', '审核', '校验', '规范']
              label_intent_kw = ['标注', '分类', '这些反馈', '这些评论',
                                 '这些评价', '帮我标', '帮我分', '全部反馈', '所有反馈',
                                 '生成报告', '标注报告', '帮我分析这些', '批量分类',
                                 '批量处理', '批量标注']
              prd_intent = any(k in user_query for k in prd_intent_kw)
              label_intent = any(k in user_query for k in label_intent_kw)

              if has_file:
                  if prd_intent and not label_intent:
                      return {
                          'validated_type': 'prd_review_file',
                          'confidence': 0.95
                      }
                  elif label_intent:
                      return {
                          'validated_type': 'data_label_file',
                          'confidence': 0.95
                      }
                  elif not user_query.strip():
                      return {
                          'validated_type': 'prd_review_file',
                          'confidence': 0.85
                      }
                  else:
                      return {
                          'validated_type': 'prd_review_file',
                          'confidence': 0.8
                      }

              try:
                  cleaned = classifier_output.strip()
                  if cleaned.startswith('```'):
                      cleaned = cleaned.split('\n', 1)[-1]
                      cleaned = cleaned.rsplit('```', 1)[0]
                  cleaned = cleaned.strip()

                  brace_count = 0
                  start = -1
                  for i, c in enumerate(cleaned):
                      if c == '{':
                          if brace_count == 0:
                              start = i
                          brace_count += 1
                      elif c == '}':
                          brace_count -= 1
                          if brace_count == 0 and start >= 0:
                              data = json.loads(cleaned[start:i+1])
                              break
                  else:
                      data = {}

                  if data:
                      raw_type = data.get('type', '')
                      confidence = float(data.get('confidence', 0))
                      type_map = {
                          'feedback': 'feedback_classify',
                          'prd_check': 'prd_check',
                          'scene_declare': 'scene_declare',
                          'invalid_input': 'invalid_input',
                          'batch': 'data_label_file'
                      }
                      if raw_type in type_map:
                          llm_type = type_map[raw_type]
              except:
                  pass

              short_negatives = ['卡', '差', '烂', '慢', '崩', '坏', '不好', '不行',
                                 '难用', '垃圾', '废了', '废', '渣', '坑']
              if len(user_query.strip()) <= 3 and user_query.strip() in short_negatives:
                  return {
                      'validated_type': 'data_label_text',
                      'confidence': 0.7
                  }

              prd_structures = [
                  '模块支持', '模块实现', '需要支持', '需要实现', '需要提供',
                  '支持多租户', '支持SSO', '支持RBAC', '支持SKU',
                  '页面：', '功能：', '需求：',
                  '点击获取', '输入手机号', '验证码.*有效',
                  '动态变化', '实时展示', '跳转.*页',
                  '多租户隔离', '单点登录', '权限控制',
              ]
              has_prd_structure = False
              for pattern in prd_structures:
                  if re.search(pattern, user_query):
                      has_prd_structure = True
                      break

              prd_tech_terms = ['Webhook', 'OAuth', 'API', 'CDN', 'Redis', 'SDK',
                                'Token', '微服务', '回调', '鉴权']
              has_prd_tech = False
              for term in prd_tech_terms:
                  if term in user_query and not any(k in user_query for k in ['闪退', '崩溃', '报错', '不能用', '坏了', '垃圾', '太慢', '卡顿']):
                      has_prd_tech = True
                      break

              fb_strong = ['闪退', '崩溃', '卡顿', '垃圾', '太慢', '不好用', '难用',
                           '不能用', '不工作', '报错', '坏了', '失灵', '太差', '坑',
                           '无语', '气死', '找不到', '没反应', '不方便', '不实用',
                           '不如', '还不如', '说好的', '太麻烦', '反人类', '智障',
                           '差', '烂', '烦死', '恶心', '骗人', '退款', '投诉',
                           '修了', '赶紧', '什么时候修', '怎么还不', '为什么不能',
