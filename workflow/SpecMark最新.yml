            ### 规则3：⚠️ 服务/配送/商家/客服问题→体验（最容易误判的区域！） 配送超时/慢/凉/洒 → 体验（软件没坏，是配送服务差） 骑手态度恶劣/扔餐/提前确认送达 → 体验（骑手行为≠软件bug） 商家取消订单/不承认问题 → 体验（商家行为≠软件故障） 食物有异物/变质/不新鲜 → 体验（食品质量≠软件bug） 客服不管/推诿/模板回复/不解决 → 体验（服务质量=体验维度） 退款慢/售后慢/等很久没人处理 → 体验（等待时间=体验） 在线问诊医生回复慢 → 体验（医疗服务等待≠软件加载慢）
            ### 规则4：性能指标→性能 卡/卡顿/慢/耗电/发热/掉帧/延迟/缓冲长/包太大→性能（能用但不达标）
