                           '经常失败', '总是失败', '频繁出错', '一直报错']
              fb_product = ['机器人', '扫地', '充电', '电池', 'APP', '蓝牙', 'WiFi',
                            '噪音', '吸力', '路径', '建图', '断开', '迷路', '充了',
                            '会员', '付费', '订阅', '扫地机', '拖地', '避障', '漏扫',
                            '基站', '水箱', '尘盒', '滤网', '边刷', '滚刷', '地图',
                            '清扫', '回充', '离线', '固件', '升级失败', '连接失败',
                            '语音', '摄像头', '门锁', '开关', '灯', '插座', '温控',
                            '传感器', '报警', '监控', '推送', '通知', '加载', '白屏',
                            '黑屏', '登录', '注册', '支付', '下单', '搜索', '评论',
                            '分享', '收藏', '上传', '下载', '播放', '卡住', '死机',
                            '重启', '耗电', '发热', '闪屏', '花屏', '延迟', '掉线']
              prd_keywords = ['模块', '需求', 'PRD', '管理', '页面',
                              '流程', '字段', '概要', '规格', '设计',
                              '原型', '交互', '用例', '评审', '版本', '迭代',
                              '里程碑', '排期', '依赖', '前置条件',
                              '验收标准', '功能描述', '业务逻辑', '状态机']
              scene_keywords = ['做', '行业', 'ToC', 'ToB', '社交', '电商', '金融',
                                '教育', '产品是', '方向', '赛道', '垂直', '领域',
                                '我在做', '我们做', '公司做', '项目是']
              scene_patterns = ['我们公司做', '我在做', '我们做', '公司做',
                                '产品是', '项目是', '做.*行业', '做.*方向',
                                '做.*赛道', '做.*领域', '做.*的$']
              has_scene_pattern = any(re.search(p, user_query) for p in scene_patterns)

              mild_suggest = ['能不能加', '能不能有', '能不能支持', '能不能优化',
                              '希望能', '希望有', '希望增加', '希望支持',
                              '可以加', '可以有', '可以增加', '可以支持',
                              '建议加', '建议增加', '建议支持', '建议优化',
                              '想要', '想加', '想要有']
              has_mild_suggest = any(s in user_query for s in mild_suggest)

              strong_count = sum(1 for k in fb_strong if k in user_query)
              product_count = sum(1 for k in fb_product if k in user_query)
              fb_count = strong_count + product_count
              prd_count = sum(1 for k in prd_keywords if k in user_query)
              scene_count = sum(1 for k in scene_keywords if k in user_query)

              consult_patterns = ['怎么连接', '如何连接', '怎么配网', '如何配网',
                                  '怎么使用', '如何使用', '怎么安装', '如何安装',
                                  '怎么设置', '如何设置', '教程', '说明书',
                                  '怎么连接WiFi', '如何连接WiFi']
              is_consult = any(p in user_query for p in consult_patterns)

              if strong_count > 0:
                  base_type = 'feedback_classify'
              elif has_scene_pattern and strong_count == 0:
                  base_type = 'scene_declare'
              elif has_prd_structure and strong_count == 0:
                  base_type = 'prd_check'
              elif has_prd_tech and strong_count == 0:
                  base_type = 'prd_check'
              elif has_mild_suggest and strong_count == 0:
                  base_type = 'feedback_classify'
              elif fb_count > prd_count and fb_count > scene_count:
                  base_type = 'feedback_classify'
              elif prd_count > 0 and prd_count >= fb_count:
                  base_type = 'prd_check'
              elif scene_count > 0 and scene_count > prd_count:
                  base_type = 'scene_declare'
              elif product_count > 0:
                  base_type = 'feedback_classify'
              else:
                  base_type = 'invalid_input'

              if base_type == 'feedback_classify' and strong_count == 0 and is_consult:
                  product_func_words = ['WiFi', 'wifi', '蓝牙', '连接', '配网', '登录', '注册',
                                        '支付', '清扫', '建图', '避障', '充电', '回充',
                                        'APP', 'app', '固件', '升级', '更新', '门锁',
                                        '摄像头', '传感器', '指纹', '语音', '网络']
                  if not any(w in user_query for w in product_func_words):
                      base_type = 'invalid_input'

              if base_type == 'invalid_input' and llm_type and llm_type != 'invalid_input':
                  base_type = llm_type

              if base_type == 'prd_check':
                  validated_type = 'prd_review_text'
              elif base_type == 'feedback_classify':
                  validated_type = 'data_label_text'
              elif base_type == 'scene_declare':
                  validated_type = 'scene_declare'
              else:
                  validated_type = 'invalid_input'

              return {
                  'validated_type': validated_type,
                  'confidence': confidence
              }
