    opening_statement: |-
      👋 我是 SpecMark，产品规范标记工具。

      你可以：
      1. 粘贴PRD片段让我标记风险
      2. 粘贴用户反馈让我分类标注
      3. 📎 上传CSV/JSON/TXT文件，批量分类反馈（支持500+条）
      4. 📎 上传CSV文件+说"批量PRD检查"，批量检查PRD
      5. 告诉我你的行业/产品类型，我会针对性检查

      示例输入：
      - 「用户管理模块支持多租户」
      - 「充了会员还是闪退，太垃圾了」
      - 「我在做ToC社交APP」
      - 上传包含多条反馈的文件 → 自动批量分类并生成报告
      - 上传PRD文件 + 「批量PRD检查」→ 逐条检查PRD风险
