                  item['type_cn'] = type_map.get(item.get('problem_type', ''), item.get('problem_type', ''))

              total = len(items)
              type_counts = {}
              sentiment_counts = {}
              priority_counts = {}
              for item in items:
                  t = item.get('type_cn', '')
                  type_counts[t] = type_counts.get(t, 0) + 1
                  s = item.get('sentiment', '')
                  sentiment_counts[s] = sentiment_counts.get(s, 0) + 1
                  p = item.get('priority', '')
                  priority_counts[p] = priority_counts.get(p, 0) + 1

              high_items = [i for i in items if i.get('priority') == '高']

              csv_buf = io.StringIO()
              csv_writer = csv.writer(csv_buf)
              csv_writer.writerow(['序号', '反馈内容', '问题类型', '情绪', '优先级', '场景', '隐含需求', '用户标签'])
              for item in items:
                  csv_writer.writerow([
                      item.get('index', ''),
                      item.get('text', ''),
                      item.get('type_cn', ''),
                      item.get('sentiment', ''),
                      item.get('priority', ''),
                      item.get('scene', ''),
                      item.get('implicit_need', '') if item.get('implicit_need') and item['implicit_need'] != '无' else '',
                      item.get('user_tags', '') if item.get('user_tags') and item['user_tags'] != '无' else ''
                  ])
