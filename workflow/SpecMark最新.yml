              }

              def detect_scene(text):
                  best = ''
                  best_score = 0
                  for key, funcs in SCENE_CORE_MAP.items():
                      kws = funcs.split(',')
                      score = sum(1 for k in kws if k in text)
                      if score > best_score:
                          best_score = score
                          best = key
                  return best if best_score >= 1 else ''

              def extract_tags(text):
                  tags = []
                  if re.search(r'(会员|VIP|充值|付费|订阅|充了|花钱)', text):
                      tags.append('付费用户')
                  if re.search(r'(刚买|刚注册|第一次用|新手)', text):
                      tags.append('新用户')
                  if re.search(r'(用了.*月|用了.*年|老用户|用了很久)', text):
                      tags.append('老用户')
                  return tags

              def extract_need(text):
                  mappings = [
                      (r'每次都要(.{2,6})', '自动化'),
                      (r'找不到(.{2,6})', '入口优化'),
                      (r'太麻烦了|太复杂', '流程简化'),
                      (r'能不能(加个|增加|支持)(.{2,8})', None),
                      (r'希望(增加|支持|有)(.{2,8})', None),
                      (r'噪音太大|太吵', '静音模式'),
                      (r'充电太慢|充电.*慢', '快充'),
                      (r'总是断连|断连', '连接稳定性'),
                      (r'没有(.{2,6})模式', None),
                  ]
                  for pattern, need in mappings:
                      m = re.search(pattern, text)
                      if m:
                          if need:
                              return need
                          groups = m.groups()
                          if len(groups) >= 2 and groups[-1]:
                              return groups[-1][:12]
                          elif len(groups) >= 1 and groups[0]:
                              return groups[0][:12]
                  return '无'

