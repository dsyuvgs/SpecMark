    - data:
        code: |
          import re
          from collections import Counter

          def main(llm_output: str) -> dict:
              try:
                  if not llm_output or not str(llm_output).strip():
                      return {
                          'output': '⚠️ 未获取到检查结果，请重新提交。'
                      }

                  llm_output = str(llm_output)

                  if '📋 Jira任务格式' in llm_output or 'Jira任务格式' in llm_output:
                      return {
                          'output': llm_output
                      }

                  if '✅ 未检测到规范风险' in llm_output:
                      return {
                          'output': llm_output
                      }

                  risk_pattern = r'【风险点】：(.+?)\n【位置】：(.+?)\n【风险等级】：(.+?)\n【修改建议】：(.+?)$'
                  risks = re.findall(risk_pattern, llm_output, re.MULTILINE)

                  if not risks:
                      return {
                          'output': llm_output + '\n\n📋 Jira任务格式：\n（未检测到标准格式风险点，请人工复核）'
                      }

                  risk_type_keywords = {
                      '场景错配': ['场景错配', 'ToB专属', '多租户', 'SSO', 'RBAC'],
                      '埋点违规': ['埋点'],
                      '数据无来源': ['数据无来源', '数据来源', '出处'],
                      '缺少异常处理': ['异常处理', '异常分支', '异常情况'],
                      '验收标准模糊': ['验收标准', '验收条件'],
                      '需求不可量化': ['不可量化', '量化指标'],
                  }

                  current_types = []
                  for risk in risks:
                      risk_point = risk[0].strip()
                      matched = False
                      for type_name, keywords in risk_type_keywords.items():
                          if any(k in risk_point for k in keywords):
                              current_types.append(type_name)
                              matched = True
                              break
                      if not matched:
                          current_types.append(risk_point[:8])

                  jira_lines = []
                  for risk in risks:
                      risk_point = risk[0].strip()
                      level_raw = risk[2].strip()
                      position = risk[1].strip()
                      suggestion = risk[3].strip()
                      if '🔴' in level_raw or '高' in level_raw:
                          priority = 'High'
                      elif '🟡' in level_raw or '中' in level_raw:
                          priority = 'Medium'
                      else:
                          priority = 'Low'
                      jira_lines.append(f"【Bug】PRD风险：{risk_point} | 优先级：{priority} | 描述：{position} {suggestion}")

                  jira_section = ''
                  if jira_lines:
                      jira_section = '\n📋 Jira任务格式：\n' + '\n'.join(jira_lines)

                  summary_section = ''
                  if len(current_types) >= 2:
                      type_counts = Counter(current_types)
                      most_common = type_counts.most_common(1)[0]
                      if most_common[1] >= 2:
                          summary_section = f'\n\n📊 本次检查最高频风险：{most_common[0]} （出现{most_common[1]}次）。建议重点关注{most_common[0]}问题。'

                  final_output = llm_output + jira_section + summary_section

                  return {
                      'output': final_output
                  }
              except Exception as e:
                  return {
                      'output': f'⚠️ 结果处理异常，原始输出如下：\n\n{llm_output if llm_output else "（无输出）"}'
                  }
