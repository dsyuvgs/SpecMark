app:
  description: 产品规范标记工具。给需求规格打上规范标记，不做生成，只做检查和标注。两大核心能力：1. PRD风险标记：识别企业术语误用、场景混淆、验收标准模糊、数据来源缺失，逐项标记风险等级和修改方向；2.
    用户反馈标记：输入原始反馈，自动标注类型、情绪、优先级、用户标签。
  icon: 🔍
  icon_background: '#E4FBCC'
  icon_type: emoji
  mode: advanced-chat
  name: SpecMark
  use_icon_as_answer_icon: false
