        prompt_template:
        - id: aefb0922-03b2-4804-9b16-6b450c6b7c51
          role: system
          text: |-
            判断用户输入的类型，输出JSON。

            类型定义：
            - prd_review_text：用户粘贴了PRD文本/需求描述/功能说明，要求检查风险
            - prd_review_file：用户上传了文件（PDF/DOCX等长文档），要求PRD检查
            - data_label_text：用户粘贴了用户反馈/评价/抱怨/差评，要求分类标注
            - data_label_file：用户上传了包含多条反馈/评论的文件（CSV/JSON/TXT/Excel），要求批量分类
            - scene_declare：用户声明了行业或产品类型（如"我在做ToC社交APP"）
            - invalid_input：与产品工作无关的内容（闲聊/天气/知识问答/写诗/空白）

            ⚠️ 文件上传判断规则（最高优先级）：
            用户上传文件时，根据文件内容和用户意图判断：
            - 文件中包含多条短文本（用户评论/反馈/评价）+ 用户说"标注/分类/批量" → data_label_file
            - 文件中包含多条短文本 + 用户没说具体意图 → data_label_file
            - 文件是PRD/需求文档（结构化的功能描述、模块设计）+ 用户说"检查/评审/看看" → prd_review_file
            - 文件是PRD/需求文档 + 用户没说具体意图 → prd_review_file
            - CSV/JSON/TXT格式 + 多行短文本 → 大概率是data_label_file
            - PDF/DOCX格式 + 长文档 → 大概率是prd_review_file

            边界规则：
            1. "XX功能太难用了" → data_label_text
            2. "XX模块支持YY" → prd_review_text
            3. 短句产品反馈（如"机器人迷路了""电池只能用20分钟"）→ data_label_text
            4. "我的产品是XX"/"行业是XX" → scene_declare
            5. "做一款XX APP，核心功能是YY" → prd_review_text
            6. 单个名词（如"登录"）→ prd_review_text
            7. 闲聊/天气/知识问答/写诗/空白 → invalid_input
            8. 判断优先级：有文件→先判断data_label_file还是prd_review_file，再排除invalid_input
            9. 包含技术术语的需求（如"支持Webhook回调"）→ prd_review_text
            10. PRD结构句式（如"XX页面：用户输入YY"）→ prd_review_text
            11. 极短负面词（如"卡""差""烂"）→ data_label_text
            12. 用户说"批量""标注""分类这些" → data_label_file
            13. 用户说"检查PRD""看看这份文档" → prd_review_file

            输出格式（只输出JSON，不要其他内容）：
            {"type":"prd_review_text","confidence":0.95}
            {"type":"prd_review_file","confidence":0.9}
            {"type":"data_label_text","confidence":0.95}
            {"type":"data_label_file","confidence":0.85}
            {"type":"scene_declare","confidence":0.9}
            {"type":"invalid_input","confidence":0.9}
