        code: "import re\nfrom collections import Counter\n\ndef main(llm_output:\
          \ str) -> dict:\n    try:\n        if not llm_output or not str(llm_output).strip():\n\
          \            return {\n                'output': '⚠️ 未获取到检查结果，请重新提交。'\n\
          \            }\n\n        llm_output = str(llm_output)\n\n        if '\U0001F4CB\
          \ Jira任务格式' in llm_output or 'Jira任务格式' in llm_output:\n            return\
          \ {\n                'output': llm_output\n            }\n\n        if '✅\
          \ 未检测到规范风险' in llm_output:\n            return {\n                'output':\
          \ llm_output\n            }\n\n        risk_pattern = r'【风险点】：(.+?)\\n【位置】：(.+?)\\\
          n【风险等级】：(.+?)\\n【修改建议】：(.+?)$'\n        risks = re.findall(risk_pattern,\
          \ llm_output, re.MULTILINE)\n\n        if not risks:\n            return\
          \ {\n                'output': llm_output + '\\n\\n\U0001F4CB Jira任务格式：\\\
          n（未检测到标准格式风险点，请人工复核）'\n            }\n\n        risk_type_keywords = {\n\
          \            '场景错配': ['场景错配', 'ToB专属', '多租户', 'SSO', 'RBAC'],\n        \
          \    '埋点违规': ['埋点'],\n            '数据无来源': ['数据无来源', '数据来源', '出处'],\n  \
          \          '缺少异常处理': ['异常处理', '异常分支', '异常情况'],\n            '验收标准模糊': ['验收标准',\
          \ '验收条件'],\n            '需求不可量化': ['不可量化', '量化指标'],\n        }\n\n     \
          \   current_types = []\n        for risk in risks:\n            risk_point\
          \ = risk[0].strip()\n            matched = False\n            for type_name,\
          \ keywords in risk_type_keywords.items():\n                if any(k in risk_point\
          \ for k in keywords):\n                    current_types.append(type_name)\n\
          \                    matched = True\n                    break\n       \
          \     if not matched:\n                current_types.append(risk_point[:8])\n\
          \n        jira_lines = []\n        for risk in risks:\n            risk_point\
          \ = risk[0].strip()\n            level_raw = risk[2].strip()\n         \
          \   position = risk[1].strip()\n            suggestion = risk[3].strip()\n\
          \            if '\U0001F534' in level_raw or '高' in level_raw:\n       \
          \         priority = 'High'\n            elif '\U0001F7E1' in level_raw\
          \ or '中' in level_raw:\n                priority = 'Medium'\n          \
          \  else:\n                priority = 'Low'\n            jira_lines.append(f\"\
          【Bug】PRD风险：{risk_point} | 优先级：{priority} | 描述：{position} {suggestion}\"\
          )\n\n        jira_section = ''\n        if jira_lines:\n            jira_section\
          \ = '\\n\U0001F4CB Jira任务格式：\\n' + '\\n'.join(jira_lines)\n\n        summary_section\
          \ = ''\n        if len(current_types) >= 2:\n            type_counts = Counter(current_types)\n\
          \            most_common = type_counts.most_common(1)[0]\n            if\
          \ most_common[1] >= 2:\n                summary_section = f'\\n\\n\U0001F4CA\
          \ 本次检查最高频风险：{most_common[0]}（出现{most_common[1]}次）。建议重点关注{most_common[0]}问题。'\n\
          \n        final_output = llm_output + jira_section + summary_section\n\n\
          \        return {\n            'output': final_output\n        }\n    except\
          \ Exception as e:\n        return {\n            'output': f'⚠️ 结果处理异常，原始输出如下：\\\
          n\\n{llm_output if llm_output else \"（无输出）\"}'\n        }\\\n"
