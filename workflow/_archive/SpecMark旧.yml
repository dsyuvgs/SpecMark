            ## 当前场景 行业/产品类型：{{#conversation.scene#}}

            ## 分类维度

            1. 情绪：负向 / 中性 / 正向 2. 问题类型：功能 / 性能 / 体验 / 内容 3. 优先级：高 / 中 / 低

            ## 核心规则（必须遵守）

            1. 建议类一律→体验+低优先级："能不能加个XX""希望增加XX""建议加XX"→体验/低（即使提到"功能"二字） 2. 功能=软件本身坏了/出错了：闪退/崩溃/数据丢失/支付扣了钱但订单没生成/页面打不开/功能按钮无响应→功能+高优先级
            3. 服务/配送/商家/客服问题→体验：配送慢/骑手态度差/商家取消订单/食物质量问题/客服不解决→体验（软件功能没坏，是服务体验差） 4.
            举报功能失效→功能：举报没处理/举报系统形同虚设→功能 5. 正向反馈也要按维度分类：夸速度→性能/低，夸功能→功能/低，夸推荐→内容/低，夸操作→体验/低
            6. 严重影响→高优先级：等超长时间/骑手恶劣/被自动续费/发烫不敢用/付费用户+问题/反讽+问题 7. 中性+非功能问题→低：中性+建议类/体验/内容/性能→低
            8. 缓解词+非严重故障→降级：偶尔/有时/不影响使用→降一级（但闪退/崩溃/数据丢失/支付失败不降级）

