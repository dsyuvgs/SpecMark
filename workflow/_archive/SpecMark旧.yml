          \ = ['检查', 'PRD', 'prd', '文档', '需求文档', '产品需求',\n                     '这份',\
          \ '怎么样', '好不好', '有没有问题', '帮我看看',\n                     '检查一下', '看看这份', '审一下',\
          \ '评审', '风险',\n                     '审查', '审核', '校验', '规范']\n    label_intent_kw\
          \ = ['标注', '分类', '这些反馈', '这些评论',\n                       '这些评价', '帮我标',\
          \ '帮我分', '全部反馈', '所有反馈',\n                       '生成报告', '标注报告', '帮我分析这些',\
          \ '批量分类',\n                       '批量处理', '批量标注']\n    prd_intent = any(k\
          \ in user_query for k in prd_intent_kw)\n    label_intent = any(k in user_query\
          \ for k in label_intent_kw)\n\n    if has_file:\n        if prd_intent and\
          \ not label_intent:\n            return {\n                'validated_type':\
          \ 'prd_review_file',\n                'confidence': 0.95\n            }\n\
          \        elif label_intent:\n            return {\n                'validated_type':\
          \ 'data_label_file',\n                'confidence': 0.95\n            }\n\
          \        elif not user_query.strip():\n            return {\n          \
          \      'validated_type': 'prd_review_file',\n                'confidence':\
          \ 0.85\n            }\n        else:\n            return {\n           \
          \     'validated_type': 'prd_review_file',\n                'confidence':\
          \ 0.8\n            }\n\n    try:\n        cleaned = classifier_output.strip()\n\
          \        if cleaned.startswith('```'):\n            cleaned = cleaned.split('\\\
          n', 1)[-1]\n            cleaned = cleaned.rsplit('```', 1)[0]\n        cleaned\
          \ = cleaned.strip()\n\n        brace_count = 0\n        start = -1\n   \
          \     for i, c in enumerate(cleaned):\n            if c == '{':\n      \
          \          if brace_count == 0:\n                    start = i\n       \
          \         brace_count += 1\n            elif c == '}':\n               \
