          \ 'scene_declare',\n                'invalid_input': 'invalid_input',\n\
          \                'batch': 'data_label_file'\n            }\n           \
          \ if raw_type in type_map:\n                llm_type = type_map[raw_type]\n\
          \    except:\n        pass\n\n    short_negatives = ['卡', '差', '烂', '慢',\
